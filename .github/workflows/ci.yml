name: CI

on:
  push:
    branches: [ main, rama-de-prueba, feature/** ]
  pull_request:
    branches: [ main, rama-de-prueba ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Back/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test --silent

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --silent

      - name: Test
        run: npm test --silent
